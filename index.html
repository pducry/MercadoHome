<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MercadoHome — Intro Animation</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="stylesheet" href="https://use.typekit.net/wuq4gdc.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <!-- ========================================
       Password Gate — bloqueia acesso ao site
       ======================================== -->
  <div class="password-gate" id="password-gate">
    <div class="password-gate-inner">
      <div class="password-gate-logo">
        <img src="Intro/Large.png" alt="Mercado Pago">
      </div>
      <p class="password-gate-label">Digite a senha para acessar</p>
      <form class="password-gate-form" id="password-gate-form" autocomplete="off">
        <input
          type="password"
          class="password-gate-input"
          id="password-gate-input"
          placeholder="Senha"
          autocomplete="off"
          autofocus
        >
        <button type="submit" class="password-gate-btn">Entrar</button>
      </form>
      <p class="password-gate-error" id="password-gate-error">Senha incorreta</p>
    </div>
  </div>

  <!-- Ativa intro antes do primeiro paint -->
  <script>
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.body.classList.add('intro-active');
    }
  </script>

  <!-- ========================================
       Intro Animation
       Phase 1: texto fade-in
       Phase 2: cartão sobe → centro (por cima do texto)
       Phase 3: cartão + texto saem → imagem entra
       Phase 4: backdrop some
  ======================================== -->
  <div class="intro-overlay" id="intro-overlay" aria-hidden="true">
    <div class="intro-backdrop"></div>

    <!-- Tipografia animada -->
    <div class="intro-typography">
      <div class="intro-line">
        <span class="intro-line-inner">Descubra a conta que</span>
      </div>
      <div class="intro-line">
        <span class="intro-line-inner">mais rende no Brasil</span>
      </div>
    </div>

    <!-- Cartão Mercado Pago (slide-up do fundo) -->
    <div class="intro-card-wrap">
      <img class="intro-card-img" src="Intro/cartao.png" alt="" aria-hidden="true">
    </div>

    <!-- Imagem BG (aparece quando cartão + texto saem) -->
    <div class="intro-image-wrap">
      <img class="intro-image" src="Intro/BG1.png" alt="">
    </div>

    <!-- Hero dim overlay (escurece a imagem) -->
    <div class="hero-dim"></div>

    <!-- Hero content (texto + CTA) -->
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="hero-title-line">Descubra a</span>
        <span class="hero-title-line">conta que mais</span>
        <span class="hero-title-line">rende no Brasil</span>
      </h1>
      <a href="#" class="hero-cta">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Abrir conta grátis
      </a>
    </div>

  </div>

  <!-- Cartão que transita entre módulo 1 e módulo 2 (fixed, controlado por JS) -->
  <div class="scroll-card" id="scroll-card">
    <img src="Intro/cartao.png" alt="" aria-hidden="true">
  </div>

  <!-- Header — estilo Negócios (desce do topo) -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="logo-badge" aria-label="Mercado Pago - Página inicial">
          <img src="Intro/Large.png" alt="Mercado Pago" class="logo-img">
        </a>

        <nav class="main-nav" role="navigation" aria-label="Navegação principal">
          <div class="nav-group">
            <button class="nav-pill" aria-haspopup="true" aria-expanded="false">
              <span>Conta Digital</span>
              <svg class="nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="nav-pill" aria-haspopup="true" aria-expanded="false">
              <span>Conta Negócio</span>
              <svg class="nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </nav>
      </div>

      <div class="header-right">
        <div class="header-right-group">
          <button class="header-icon-btn" aria-label="Ajuda" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </button>
          <a href="#" class="header-btn-entrar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            Entrar
          </a>
        </div>

        <button class="header-menu-toggle" aria-label="Abrir menu" aria-expanded="false">
          <span class="header-menu-icon"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Spacer: ocupa a altura do viewport pra empurrar módulo 2 abaixo do overlay fixo -->
  <div class="hero-spacer"></div>

  <!-- ========================================
       Horizontal Section — Module 2 + Module 3
       Scroll vertical → navegação horizontal
       ======================================== -->
  <div class="horizontal-section" id="horizontal-section">
    <div class="horizontal-sticky">
      <div class="horizontal-track" id="horizontal-track">

        <!-- Module 2 — Conta & Cofrinhos -->
        <section class="module-2" id="module-2">
          <div class="module-2-inner">
            <div class="module-2-features">
              <div class="feature-item feature-left">
                <span class="feature-label">Conta em até</span>
                <span class="feature-value">105%<span class="feature-unit"> do CDI</span></span>
              </div>

              <div class="module-2-center">
                <div class="module-2-card-placeholder" id="module-2-card-placeholder"></div>
                <a href="#" class="module-2-cta">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                  </svg>
                  Abrir conta grátis
                </a>
              </div>

              <div class="feature-item feature-right">
                <span class="feature-label">Cofrinhos em até</span>
                <span class="feature-value">120%<span class="feature-unit"> do CDI</span></span>
              </div>
            </div>
          </div>
        </section>

        <!-- Module 3 — Cartão de Crédito -->
        <section class="module-3" id="module-3">
          <div class="module-3-inner">
            <h2 class="module-3-title">
              <span>Cartão de Crédito</span>
              <span>sem <strong>Anuidade</strong></span>
            </h2>

            <div class="module-3-image-wrap">
              <img class="module-3-image" src="Intro/module3-woman.png" alt="Mulher sorrindo">
              <div class="module-3-badge">
                <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <path id="circlePath" d="M 75,75 m -55,0 a 55,55 0 1,1 110,0 a 55,55 0 1,1 -110,0"/>
                  </defs>
                  <text>
                    <textPath href="#circlePath">CARTÃO MERCADO PAGO • CARTÃO MERCADO PAGO •</textPath>
                  </text>
                </svg>
              </div>
            </div>

            <a href="#" class="module-3-cta">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              Abrir conta grátis
            </a>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
